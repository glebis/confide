name: check-artifacts

# Deterministic, LLM-free, network-free guard: fails the build if any committed
# benchmark artifact has drifted from what the current gold + detector caches
# produce. See eval/REPRODUCIBILITY.md §8 and eval/check_artifacts.py.
#
# This job runs ONLY stdlib Python against committed gold + detector caches
# (JSONL in the repo). It does NOT need Ollama / OPF / Presidio / torch /
# transformers or any network access.

on:
  push:
  pull_request:

jobs:
  check-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      - name: Run unit tests
        # Deterministic, LLM-free unit tests (relative_dates, kanon, linkability,
        # frontmatter). `make test` sets PYTHONPATH=src and runs `pytest tests/`.
        run: make test

      - name: Run artifact drift check
        # check_artifacts is part of the confide_eval package; `make check` sets
        # PYTHONPATH=src and runs it via `python -m`. No pip install is required —
        # the drift check is pure standard library against committed gold + caches.
        run: make check
